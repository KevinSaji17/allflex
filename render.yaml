services:
  - type: web
    name: allflex
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn allflex.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_MODE
        value: sqlite
      - key: ALLOWED_HOSTS
        sync: false
    autoDeploy: true
