{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-2xl p-8 shadow">
        <h2 class="text-2xl font-semibold text-slate-900 text-center">Welcome back</h2>
        <p class="text-sm text-slate-500 text-center mt-1">Sign in to continue to ALLFLEX</p>

        <form method="post" class="mt-6">
            {% csrf_token %}
            <div class="space-y-4">
                {% for field in form %}
                    <div>
                        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-700">{{ field.label }}</label>
                        <input id="{{ field.id_for_label }}" name="{{ field.name }}" type="{{ field.field.widget.input_type }}" placeholder="" class="mt-1 block w-full rounded-md border border-slate-200 px-3 py-2 focus:ring-2 focus:ring-teal-500">
                        {% if field.errors %}
                            <p class="text-xs text-red-600 mt-1">{{ field.errors.as_text }}</p>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>

            <button type="submit" class="w-full mt-6 inline-flex items-center justify-center px-4 py-2 bg-teal-600 text-white rounded-md hover:bg-teal-700">Sign in</button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-500">Don't have an account? <a href="{% url 'signup' %}" class="font-medium text-teal-600 hover:underline">Create account</a></p>
    </div>
</div>

{% endblock %}
