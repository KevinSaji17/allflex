{% extends 'base.html' %}

{% block content %}
<div class="relative overflow-hidden rounded-3xl border border-slate-200 bg-white p-10 shadow-sm">
    <div class="absolute inset-0 -z-10 opacity-60" style="background: radial-gradient(circle at 20% 10%, rgba(16,185,129,.12), transparent 50%), radial-gradient(circle at 80% 30%, rgba(34,211,238,.10), transparent 55%)"></div>
    <div class="mx-auto max-w-2xl text-center">
        <div class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-semibold text-slate-700">
            <span class="inline-flex h-2 w-2 rounded-full bg-emerald-500"></span>
            Plans & Credits
        </div>
        <h1 class="mt-5 text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">Flexible options, coming soon</h1>
        <p class="mt-3 text-base leading-7 text-slate-600">We’re polishing tiers, credits, and perks. Check back shortly.</p>

        <div class="mt-8 flex flex-col items-stretch justify-center gap-3 sm:flex-row">
            <a href="{% url 'signup' %}" class="inline-flex items-center justify-center rounded-xl bg-emerald-600 px-6 py-3 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700">Create account</a>
            <a href="{% url 'home' %}" class="inline-flex items-center justify-center rounded-xl border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-900 shadow-sm hover:bg-slate-50">Back to home</a>
        </div>
    </div>
</div>
{% endblock %}
